<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic Tac Toe</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #0f172a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: Arial, sans-serif;
        }

        .container {
            text-align: center;
        }

        .title {
            font-size: 32px;
            font-weight: bold;
            color: #f8fafc;
            margin-bottom: 10px;
            margin-top: 20px;
        }

        .subtitle {
            font-size: 14px;
            color: #cbd5e1;
            margin-bottom: 20px;
        }

        .board {
            background-color: #111827;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            padding: 12px;
            margin-bottom: 16px;
            border-radius: 8px;
        }

        .button {
            width: 100px;
            height: 100px;
            font-size: 32px;
            font-weight: bold;
            background-color: #1f2937;
            color: #f8fafc;
            border: none;
            cursor: pointer;
            border-radius: 4px;
            transition: background-color 0.3s ease;
        }

        .button:hover {
            background-color: #374151;
        }

        .button:active {
            background-color: #2d3748;
        }

        .restart-btn {
            font-size: 16px;
            font-weight: bold;
            background-color: #2563eb;
            color: #ffffff;
            border: none;
            padding: 10px 20px;
            cursor: pointer;
            border-radius: 4px;
            transition: background-color 0.3s ease;
        }

        .restart-btn:hover {
            background-color: #1d4ed8;
        }

        .restart-btn:active {
            background-color: #1e40af;
        }

        .status {
            font-size: 18px;
            color: #cbd5e1;
            margin-top: 20px;
            min-height: 24px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="title">Tic Tac Toe</div>
        <div class="subtitle">لعب مع صديقك</div>
        
        <div class="board" id="board">
            <button class="button" data-index="0"></button>
            <button class="button" data-index="1"></button>
            <button class="button" data-index="2"></button>
            <button class="button" data-index="3"></button>
            <button class="button" data-index="4"></button>
            <button class="button" data-index="5"></button>
            <button class="button" data-index="6"></button>
            <button class="button" data-index="7"></button>
            <button class="button" data-index="8"></button>
        </div>

        <button class="restart-btn" id="restart">إعادة تشغيل</button>
        <div class="status" id="status"></div>
    </div>

    <script>
        class TicTacToe {
            constructor() {
                this.current = "X";
                this.moves = 0;
                this.buttons = document.querySelectorAll('.button');
                this.statusDisplay = document.getElementById('status');
                this.board = ["", "", "", "", "", "", "", "", ""];
                this.gameOver = false;

                this.buttons.forEach(btn => {
                    btn.addEventListener('click', (e) => this.onClick(e.target));
                });

                document.getElementById('restart').addEventListener('click', () => this.reset());
            }

            onClick(btn) {
                const index = parseInt(btn.dataset.index);
                if (this.board[index] !== "" || this.gameOver) {
                    return;
                }

                this.board[index] = this.current;
                btn.textContent = this.current;
                this.moves++;

                const winner = this.checkWinner();
                if (winner) {
                    this.statusDisplay.textContent = `الفائز: ${winner}`;
                    this.gameOver = true;
                    alert(`انتهت اللعبة\nالفائز: ${winner}`);
                } else if (this.moves === 9) {
                    this.statusDisplay.textContent = "تعادل!";
                    this.gameOver = true;
                    alert("انتهت اللعبة\nتعادل!");
                } else {
                    this.current = this.current === "X" ? "O" : "X";
                    this.statusDisplay.textContent = `دور اللاعب: ${this.current}`;
                }
            }

            checkWinner() {
                const lines = [
                    [0, 1, 2],
                    [3, 4, 5],
                    [6, 7, 8],
                    [0, 3, 6],
                    [1, 4, 7],
                    [2, 5, 8],
                    [0, 4, 8],
                    [2, 4, 6]
                ];

                for (let line of lines) {
                    const [a, b, c] = line;
                    if (this.board[a] && this.board[a] === this.board[b] && this.board[a] === this.board[c]) {
                        return this.board[a];
                    }
                }
                return null;
            }

            reset() {
                this.current = "X";
                this.moves = 0;
                this.board = ["", "", "", "", "", "", "", "", ""];
                this.gameOver = false;
                this.statusDisplay.textContent = `دور اللاعب: ${this.current}`;
                this.buttons.forEach(btn => {
                    btn.textContent = "";
                });
            }
        }

        new TicTacToe();
    </script>
</body>
</html>
